name: AI Daily Briefing

on:
  schedule:
    - cron: '0 22 */3 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth

      - name: Run AI Daily Briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE: /tmp/gcloud-credentials.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > /tmp/gcloud-credentials.json
          python main.py

      - name: Deploy HTML to GitHub Pages
        run: |
          mkdir -p docs
          # 复制今天的HTML到docs
          cp -f briefing_*_ja.html docs/index.html 2>/dev/null || true
          # 也保留历史版本
          for f in briefing_*_ja.html; do
            [ -f "$f" ] && cp "$f" "docs/$f"
          done

      - name: Send JA briefing link to Slack
        env:
          SLACK_WEBHOOK_URL_JA: ${{ secrets.SLACK_WEBHOOK_URL_JA }}
        if: env.SLACK_WEBHOOK_URL_JA != ''
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          curl -s -X POST "$SLACK_WEBHOOK_URL_JA" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"AI Daily Briefing (日本語版) が更新されました\n$PAGES_URL\"}" || true

      - name: Commit history and HTML
        if: always()
        run: |
          rm -f /tmp/gcloud-credentials.json
          git config user.name "AI Daily Briefing Bot"
          git config user.email "bot@ai-daily-briefing"
          git add history.json docs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update $(date +%Y-%m-%d)"
          git push || true
